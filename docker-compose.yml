services:
  app:
    build: .
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://traiteurs:traiteurs@db:5432/traiteurs
      - SECRET_KEY=change-me-in-production
      - STRIPE_SECRET_KEY=
      - STRIPE_PUBLISHABLE_KEY=
      - STRIPE_WEBHOOK_SECRET=
      - STRIPE_CONNECT_CLIENT_ID=
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: traiteurs
      POSTGRES_PASSWORD: traiteurs
      POSTGRES_DB: traiteurs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traiteurs"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

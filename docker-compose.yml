services:
  app:
    build: .
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://traiteurs:traiteurs@db:5432/traiteurs
      # SECRET_KEY must be set via .deploy.env or shell env. App fails to boot if missing or <32 chars.
      - SECRET_KEY=${SECRET_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_CONNECT_CLIENT_ID=${STRIPE_CONNECT_CLIENT_ID:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-}
      - ENABLE_DEMO_SEED=${ENABLE_DEMO_SEED:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-}
      - SECURE_COOKIES=${SECURE_COOKIES:-}
    depends_on:
      db:
        condition: service_healthy
    # Resource caps and process hardening (P3.1):
    # - mem_limit prevents a runaway worker (or DoS) from OOM-killing the
    #   host or starving Postgres in the same compose project.
    # - cpus throttles the same worker before it monopolises every core.
    # - no-new-privileges blocks setuid/setgid escalation inside the
    #   container even if a CVE in a Python C-extension lets attackers
    #   exec a binary.
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 2.0
    pids_limit: 200
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: traiteurs
      POSTGRES_PASSWORD: traiteurs
      POSTGRES_DB: traiteurs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traiteurs"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Same hardening on Postgres: caps + no privilege escalation.
    # 2 GB / 2 CPUs is generous for the dataset size we expect; adjust if
    # the dashboard reports memory pressure under real production load.
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 2.0
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:

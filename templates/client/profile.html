{% extends "base.html" %}

{% block title %}Mon profil{% endblock %}

{% block content %}
<div class="mb-8">
  <h1 class="font-display text-2xl font-semibold text-navy">Mon profil</h1>
  <p class="text-navy-300 mt-1">Modifier vos informations personnelles</p>
</div>

<div class="max-w-lg">
  <form method="post" action="{{ url_for('client.profile') }}" class="bg-white rounded-xl border border-cream-200 p-6 shadow-sm space-y-4">
    <div>
      <label class="block text-sm font-medium text-navy mb-1">Prenom</label>
      <input type="text" name="first_name" value="{{ user.first_name }}" required
        class="w-full px-3 py-2 border border-cream-300 rounded-lg text-sm focus:outline-none focus:border-terracotta">
    </div>
    <div>
      <label class="block text-sm font-medium text-navy mb-1">Nom</label>
      <input type="text" name="last_name" value="{{ user.last_name }}" required
        class="w-full px-3 py-2 border border-cream-300 rounded-lg text-sm focus:outline-none focus:border-terracotta">
    </div>
    <div>
      <label class="block text-sm font-medium text-navy mb-1">Email</label>
      <input type="email" name="email" value="{{ user.email }}" required
        class="w-full px-3 py-2 border border-cream-300 rounded-lg text-sm focus:outline-none focus:border-terracotta">
    </div>
    <button type="submit"
      class="px-6 py-2 bg-terracotta text-white text-sm font-medium rounded-lg hover:bg-terracotta-500 transition-colors">
      Enregistrer
    </button>
  </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% from "components/ui.html" import page_header %}

{% block title %}Mon profil{% endblock %}

{% block content %}
<main class="bg-cream min-h-screen">

    {{ page_header("Mon profil") }}

    <div class="max-w-lg">
      <form method="post" action="{{ url_for('client.profile') }}" class="bg-white rounded-lg p-6 space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label class="block text-sm font-bold mb-2 text-text">Prenom</label>
          <input type="text" name="first_name" value="{{ user.first_name }}" required
            class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-text">Nom</label>
          <input type="text" name="last_name" value="{{ user.last_name }}" required
            class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-text">Email</label>
          <input type="email" name="email" value="{{ user.email }}" required
            class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-text">Mot de passe actuel <span class="font-normal text-gray-500">(requis pour changer l'email)</span></label>
          <input type="password" name="current_password" autocomplete="current-password"
            class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
        </div>
        <button type="submit"
          class="rounded-full text-sm font-bold px-4 py-2.5 btn-navy">
          Enregistrer
        </button>
      </form>
    </div>

</main>
{% endblock %}

{% extends "base.html" %}
{% block title %}Conversation avec {{ other_user.first_name }} {{ other_user.last_name }} — Les Traiteurs Engages{% endblock %}
{% block content %}
<main class="bg-cream min-h-screen">

    <!-- Back button -->
    <a href="{{ url_for('client.messages') }}" class="inline-flex items-center gap-1 text-xs font-bold hover:opacity-70 transition-opacity mb-6 text-navy">
      <i data-lucide="chevron-left" class="w-4 h-4"></i> Retour
    </a>

    <div class="h-chat bg-white rounded-lg flex flex-col">
      <!-- Header -->
      <div class="px-6 py-4 flex items-center gap-3 border-b border-soft">
        <div class="w-9 h-9 rounded-lg flex items-center justify-center bg-cream">
          <i data-lucide="user" class="w-4 h-4 text-navy"></i>
        </div>
        <p class="text-sm font-bold text-text">{{ other_user.first_name }} {{ other_user.last_name }}</p>
      </div>

      <!-- Messages -->
      <div id="messages-container"
           class="flex-1 overflow-y-auto p-6"
           data-thread-id="{{ thread_id }}"
           data-current-user-id="{{ user.id }}">
      </div>

      <!-- Input -->
      <form id="message-form" class="p-4 flex gap-3 border-t border-soft">
        <input type="hidden" name="recipient_id" value="{{ other_user.id }}">
        <input type="text" name="body" placeholder="Votre message..."
               class="flex-1 border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default"
               autocomplete="off">
        <button type="submit"
                class="rounded-full text-xs font-bold px-4 py-2.5 flex items-center gap-2 bg-navy text-white">
          <i data-lucide="send" class="w-4 h-4"></i> Envoyer
        </button>
      </form>
    </div>

</main>
{% endblock %}
{% block scripts %}
<script src="/static/js/messages.js"></script>
{% endblock %}

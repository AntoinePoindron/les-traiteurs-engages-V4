{% extends "base.html" %}

{% block title %}Parametres entreprise{% endblock %}

{% block content %}
<main class="bg-cream min-h-screen">
  <div style="padding: 54px 24px 48px; max-width: 1020px; margin: 0 auto;">

    <h1 class="font-display font-bold text-4xl mb-6 text-text">Parametres entreprise</h1>

    <div class="max-w-lg">
      <form method="post" action="{{ url_for('client.settings') }}" class="bg-white rounded-lg p-6 space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
          <label class="block text-sm font-bold mb-2 text-text">Nom de l'entreprise</label>
          <input type="text" name="name" value="{{ company.name }}" required
            class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-text">SIRET</label>
          <input type="text" name="siret" value="{{ company.siret }}" required maxlength="14" pattern="\d{14}"
            class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-text">Adresse</label>
          <input type="text" name="address" value="{{ company.address or '' }}"
            class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold mb-2 text-text">Ville</label>
            <input type="text" name="city" value="{{ company.city or '' }}"
              class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
          </div>
          <div>
            <label class="block text-sm font-bold mb-2 text-text">Code postal</label>
            <input type="text" name="zip_code" value="{{ company.zip_code or '' }}" maxlength="10"
              class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
          </div>
        </div>
        <div>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="oeth_eligible" value="1" {{ 'checked' if company.oeth_eligible }} class="accent-navy rounded">
            <span class="text-sm font-bold text-text">Eligible OETH</span>
          </label>
        </div>
        <div>
          <label class="block text-sm font-bold mb-2 text-text">Budget annuel (EUR)</label>
          <input type="number" name="budget_annual" value="{{ company.budget_annual or '' }}" step="0.01" min="0"
            class="w-full border rounded-lg px-3 py-2.5 text-sm text-black outline-none focus:border-navy transition-colors border-default">
        </div>
        <button type="submit"
          class="rounded-full text-sm font-bold px-4 py-2.5 btn-navy">
          Enregistrer
        </button>
      </form>
    </div>

  </div>
</main>
{% endblock %}
